<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoQuePrompt</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <h1>AutoQuePrompt</h1>
    <span class="tag">Google Flow &amp; Higgsfield batch queue</span>
  </header>

  <!-- 1. Connect + teach selectors -->
  <section class="card">
    <div class="card-title">1 · Connect</div>
    <button id="connectBtn" class="btn">Connect to current tab</button>
    <div id="connStatus" class="status muted">Open Google Flow or Higgsfield in a tab, then click Connect.</div>

    <div class="pick-row">
      <button id="pickInput" class="btn ghost" disabled>Pick prompt field</button>
      <span id="inputOk" class="check">—</span>
    </div>
    <div class="pick-row">
      <button id="pickGenerate" class="btn ghost" disabled>Pick Generate button</button>
      <span id="generateOk" class="check">—</span>
    </div>
  </section>

  <!-- 2. Prompts -->
  <section class="card">
    <div class="card-title">2 · Prompts <span id="promptCount" class="pill">0</span></div>
    <p class="hint">Paste prompts separated by a blank line (double spacing):</p>
    <textarea id="prompts" spellcheck="false" placeholder="Prompt 1

Prompt 2

Prompt 3"></textarea>
    <button id="loadBtn" class="btn">Load into queue</button>
  </section>

  <!-- 3. Run controls -->
  <section class="card">
    <div class="card-title">3 · Run <span id="progress" class="pill">0 / 0</span></div>
    <div class="btn-row">
      <button id="startBtn" class="btn primary" disabled>Start</button>
      <button id="stopBtn" class="btn danger" disabled>Stop</button>
    </div>
    <div class="btn-row">
      <button id="resetBtn" class="btn ghost small">Reset statuses</button>
      <button id="clearBtn" class="btn ghost small">Clear queue</button>
    </div>
    <div id="runStatus" class="status muted"></div>
  </section>

  <!-- Queue list -->
  <section class="card">
    <div class="card-title queue-head">
      <span>Queue</span>
      <div class="queue-head-btns">
        <button id="downloadPageBtn" class="btn ghost small" title="Rescue: download every result image currently on the page, ignoring queue status">Download page</button>
        <button id="downloadAllBtn" class="btn ghost small" disabled>Download all</button>
      </div>
    </div>
    <ol id="queueList" class="queue"></ol>
  </section>

  <!-- Settings -->
  <details class="card">
    <summary class="card-title">Settings</summary>

    <label class="field">
      <span>Completion detection</span>
      <select id="mode">
        <option value="fixed">Fixed time per prompt (simplest)</option>
        <option value="results">Wait for new result (pick a thumbnail)</option>
        <option value="enabled">Wait for Generate to re-enable</option>
        <option value="busy">Wait for busy indicator to clear</option>
      </select>
    </label>

    <label class="field">
      <span>Seconds per prompt (fixed mode)</span>
      <input id="secondsPerPrompt" type="number" min="3" value="30" />
    </label>

    <label class="field">
      <span>Max wait per prompt (sec)</span>
      <input id="maxWaitSec" type="number" min="10" value="180" />
    </label>

    <label class="field">
      <span>Max concurrent generations <span class="hint-inline">(1 = one at a time · 0 = unlimited/blast)</span></span>
      <input id="maxConcurrent" type="number" min="0" max="999" value="1" />
    </label>

    <label class="field">
      <span>Result order (concurrent)</span>
      <select id="resultOrder">
        <option value="newest">Newest first (most galleries)</option>
        <option value="oldest">Oldest first</option>
      </select>
    </label>

    <label class="field">
      <span>Delay between prompts (sec)</span>
      <input id="delaySec" type="number" min="0" step="0.5" value="1.5" />
    </label>

    <label class="field">
      <span>Submit method</span>
      <select id="submitMethod">
        <option value="button">Click Generate button</option>
        <option value="enter">Press Enter</option>
        <option value="both">Both</option>
      </select>
    </label>

    <label class="field">
      <span>Confirm submission</span>
      <select id="submitConfirm">
        <option value="clear">Prompt box clears after submit (Google Flow)</option>
        <option value="none">Don't verify — box keeps text (Higgsfield)</option>
      </select>
    </label>

    <label class="field check-field">
      <input id="autoSave" type="checkbox" checked />
      <span>Auto-save each image when it finishes, named by its <code>[mm-ss] Scene_Name</code> label</span>
    </label>

    <div class="pick-row">
      <button id="pickResults" class="btn ghost small">Pick result thumbnail</button>
      <span id="resultsOk" class="check">—</span>
    </div>
    <div class="pick-row">
      <button id="pickBusy" class="btn ghost small">Pick busy indicator</button>
      <span id="busyOk" class="check">—</span>
    </div>
  </details>

  <script src="sidepanel.js"></script>
</body>
</html>
